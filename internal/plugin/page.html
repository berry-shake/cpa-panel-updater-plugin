<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel Updater - CLI Proxy API</title>
  <style>
    /* Design tokens mirrored from the management center themes.scss. */
    :root {
      color-scheme: light dark;
      --bg-secondary: #faf9f5;
      --bg-primary: #f0eee8;
      --bg-tertiary: #e9e6df;
      --text-primary: #2d2a26;
      --text-secondary: #6d6760;
      --border-color: #e3e1db;
      --border-hover: #cecac4;
      --primary-color: #8b8680;
      --primary-hover: #7f7a74;
      --primary-contrast: #ffffff;
      --success-color: #10b981;
      --error-color: #c65746;
      --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.08);
      --radius-md: 8px;
      --radius-lg: 12px;
      --focus-ring: rgba(139, 134, 128, 0.18);
    }
    [data-theme='white'] {
      --bg-secondary: #ffffff;
      --bg-primary: #ffffff;
      --bg-tertiary: #f6f6f6;
      --border-color: #e5e5e5;
      --border-hover: #cccccc;
    }
    [data-theme='dark'] {
      --bg-secondary: #151412;
      --bg-primary: #1d1b18;
      --bg-tertiary: #262320;
      --text-primary: #f6f4f1;
      --text-secondary: #c9c3bb;
      --border-color: #3a3530;
      --border-hover: #5a544d;
      --primary-hover: #9a948e;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
        'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      line-height: 1.5;
    }
    main { max-width: 820px; margin: 48px auto; padding: 0 20px; }
    .card {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 8px; font-size: 18px; font-weight: 700; color: var(--text-primary); }
    p { margin: 0; color: var(--text-secondary); font-size: 14px; }
    code {
      font-family: 'Courier New', Courier, monospace;
      background-color: var(--bg-tertiary);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 13px;
    }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    input {
      width: 100%;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      font: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
      color: var(--primary-contrast);
    }
    .btn-primary:hover:not(:disabled) {
      background-color: var(--primary-hover);
      border-color: var(--primary-hover);
    }
    .btn-secondary {
      background-color: var(--bg-tertiary);
      border-color: var(--border-color);
      color: var(--text-primary);
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--border-hover); }
    dl { display: grid; grid-template-columns: 190px 1fr; gap: 9px 14px; margin: 0; font-size: 14px; }
    dt { color: var(--text-secondary); }
    dd { margin: 0; overflow-wrap: anywhere; }
    .result-title { font-weight: 700; font-size: 14px; }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px;
      min-height: 22px;
      margin: 12px 0 0;
    }
    .ok { color: var(--success-color); }
    .error { color: var(--error-color); }
    @media (max-width: 640px) { dl { grid-template-columns: 1fr; } dt { margin-top: 8px; } }
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>Management Panel Updater</h1>
    <p>Reads <code>remote-management.panel-github-repository</code> from the active host config and atomically updates <code>management.html</code>.</p>
  </section>
  <section class="card">
    <div class="actions">
      <button id="status-button" class="btn btn-secondary" type="button">Check status</button>
      <button id="update-button" class="btn btn-primary" type="button">Update now</button>
    </div>
  </section>
  <section class="card">
    <dl>
      <dt>Config file</dt><dd id="config-file">—</dd>
      <dt>Config readable</dt><dd id="config-readable">—</dd>
      <dt>Panel repository</dt><dd id="repository">—</dd>
      <dt>Release API</dt><dd id="release-url">—</dd>
      <dt>Static directory</dt><dd id="static-dir">—</dd>
      <dt>Panel file</dt><dd id="file-path">—</dd>
      <dt>File state</dt><dd id="file-state">—</dd>
      <dt>SHA-256</dt><dd id="sha256">—</dd>
    </dl>
  </section>
  <section class="card">
    <span class="result-title">Result</span>
    <pre id="result">Ready.</pre>
  </section>
</main>
<script>
(() => {
  // Follow the management center theme preference (zustand persist payload).
  function applyPanelTheme() {
    let theme = 'auto';
    try {
      const stored = JSON.parse(localStorage.getItem('cli-proxy-theme') || 'null');
      if (stored && stored.state && typeof stored.state.theme === 'string') theme = stored.state.theme;
    } catch (_) { /* keep auto */ }
    if (theme === 'auto') {
      const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      theme = dark ? 'dark' : 'white';
    }
    if (theme === 'dark' || theme === 'white') {
      document.documentElement.setAttribute('data-theme', theme);
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  }
  applyPanelTheme();
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyPanelTheme);
  }

  const statusButton = document.getElementById('status-button');
  const updateButton = document.getElementById('update-button');
  const result = document.getElementById('result');

  function setResult(message, isError) {
    result.textContent = message;
    result.className = isError ? 'error' : 'ok';
  }

  async function api(path) {
    const response = await fetch(path, { method: 'GET', cache: 'no-store' });
    const text = await response.text();
    let data;
    try { data = JSON.parse(text); } catch (_) { data = { message: text || `HTTP ${response.status}` }; }
    if (!response.ok) throw new Error(data.message || data.error || `HTTP ${response.status}`);
    return data;
  }

  function renderStatus(data) {
    document.getElementById('config-file').textContent = data.config_file.path || '—';
    document.getElementById('config-readable').textContent = data.config_file.readable ? 'yes' : `no${data.config_file.error ? ` — ${data.config_file.error}` : ''}`;
    document.getElementById('repository').textContent = data.panel_github_repository || '—';
    document.getElementById('release-url').textContent = data.release_url || '—';
    document.getElementById('static-dir').textContent = data.static_dir || '—';
    document.getElementById('file-path').textContent = data.file_path || '—';
    document.getElementById('file-state').textContent = data.exists ? `${data.size} bytes, modified ${data.modified_at}` : 'missing';
    document.getElementById('sha256').textContent = data.local_sha256 || '—';
  }

  async function checkStatus() {
    statusButton.disabled = true;
    try {
      const data = await api('/v0/resource/plugins/panel-updater/status');
      renderStatus(data);
      setResult('Status loaded.', false);
    } catch (error) {
      setResult(error.message, true);
    } finally {
      statusButton.disabled = false;
    }
  }

  async function updatePanel() {
    updateButton.disabled = true;
    try {
      const data = await api('/v0/resource/plugins/panel-updater/update');
      setResult(`${data.message}\nsource=${data.source}\nhash=${data.hash}`, false);
      await checkStatus();
    } catch (error) {
      setResult(error.message, true);
    } finally {
      updateButton.disabled = false;
    }
  }

  statusButton.addEventListener('click', checkStatus);
  updateButton.addEventListener('click', updatePanel);
})();
</script>
</body>
</html>
