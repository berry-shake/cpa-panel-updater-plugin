name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            extension: so
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            extension: so
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            extension: dylib
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            extension: dylib
          - runner: windows-latest
            goos: windows
            goarch: amd64
            extension: dll
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install MinGW
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Add MinGW to PATH
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH 'C:\msys64\mingw64\bin'
      - name: Build shared library
        shell: bash
        env:
          TARGET_GOOS: ${{ matrix.goos }}
          TARGET_GOARCH: ${{ matrix.goarch }}
          EXTENSION: ${{ matrix.extension }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          # Build with a plain file name first: Go 1.26 embeds the output
          # name into a linker .def file, and GNU ld rejects names with
          # extra dots (e.g. "v0.1") on Windows. Rename afterwards.
          BUILD_OUTPUT="panel-updater.${EXTENSION}"
          OUTPUT="panel-updater-v${VERSION}-${TARGET_GOOS}-${TARGET_GOARCH}.${EXTENSION}"
          CGO_ENABLED=1 GOOS="${TARGET_GOOS}" GOARCH="${TARGET_GOARCH}" \
            go build -buildmode=c-shared -trimpath \
            -ldflags "-s -w -X main.pluginVersion=${VERSION}" \
            -o "${BUILD_OUTPUT}" .
          rm -f "${BUILD_OUTPUT%.*}.h"
          mkdir -p dist
          mv "${BUILD_OUTPUT}" "dist/${OUTPUT}"
      - uses: actions/upload-artifact@v4
        with:
          name: panel-updater-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: panel-updater-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
